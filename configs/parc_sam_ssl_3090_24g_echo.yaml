experiment:
  name: PARC_SAM_SSL_v4_ProtoPrompt_UPSC_RTX3090_24G_echoData
  output_dir: outputs/PARC_SAM_SSL_v4_ProtoPrompt_UPSC_RTX3090_24G_echoData
  seed: 2026
  log_interval: 10
  val_interval: 200
  save_interval: 1000

data:
  root: /root/autodl-tmp/echoData/260513_data_labeled30pct
  dataset_name: null
  num_classes: 3
  in_channels: 3
  image_size: 256
  ignore_index: 255
  labeled_subdir: labeled
  unlabeled_subdir: unlabeled
  val_subdir: val
  test_subdir: test
  image_dir_name: image
  mask_dir_name: mask
  num_workers: 4

model:
  base_channels: 40
  dropout: 0.08
  feature_dim: 144

sam:
  enabled: true
  allow_surrogate_without_checkpoint: false
  checkpoint: /root/autodl-tmp/sam_vit_b_01ec64.pth
  model_type: vit_b
  source: auto
  image_size: 1024
  min_prompt_area: 12
  min_sam_confidence: 0.60
  min_prompt_confidence: 0.62
  max_prompt_area_ratio: 0.14
  prompt_topk_area_ratio: 0.035
  empty_prompt_as_sam: false
  sam_background_weight: 0.45
  sam_foreground_weight: 0.62
  sam_iou_min: 0.44
  sam_iou_power: 1.0
  detach_sam: true

train:
  device: cuda
  max_iterations: 22000
  batch_size_labeled: 4
  batch_size_unlabeled: 2
  lr: 0.0004
  weight_decay: 0.0001
  ema_decay: 0.997
  amp: true
  grad_clip: 5.0
  warmup_iterations: 2800
  unsup_start_iterations: 600
  unsup_ramp: sigmoid

loss:
  supervised: 1.0
  pseudo: 0.28
  proposal_set: 0.22
  uncertainty_consistency: 0.18
  prototype: 0.12
  correlation: 0.04
  sam_alignment: 0.025
  min_pseudo_weight: 0.06
  min_uncertainty_weight: 0.06
  ambiguity_bonus: 0.70
  pseudo_on_singletons_only: true

risk:
  alpha: 0.18
  min_pixels_per_class: 48
  min_quantile: 0.02
  max_quantile: 0.90
  max_foreground_quantile: 0.56
  prior_momentum: 0.95
  class_balance_power: 0.60
  teacher_confidence: 0.67
  max_candidate_set_size: 2
  agreement_bonus: 0.12
  conflict_penalty: 0.55
  safe_negative_threshold: 0.020

target:
  target_mode: set_valued
  use_risk: true
  use_sam: true
  use_prototype: true
  use_prototype_prompt: true
  use_correlation: true
  use_alignment: true
  prompt_teacher_weight: 0.48
  prompt_prototype_weight: 0.52
  prompt_temperature: 0.90
  prompt_max_foreground_ratio: 0.10
  prompt_min_foreground_confidence: 0.44
  foreground_guard: true
  min_foreground_participation: 0.015
  foreground_rescue_confidence: 0.44
  foreground_min_weight: 0.10
  class_area_guard: true
  max_foreground_area_multiplier: 4.5
  max_foreground_area_floor: 0.015
  max_foreground_area_ceiling: 0.10
  area_guard_min_pixels: 64
  area_guard_weight: 0.0
  prototype_evidence_weight: 0.78

prototype:
  momentum: 0.965
  temperature: 0.08
  min_pixels: 24

visualization:
  enabled: true
  interval: 200
  max_images: 2
  panel_size: 192
  min_healthy_foreground_ratio: 0.01
  max_healthy_foreground_ratio: 0.30
  max_healthy_background_only_ratio: 0.98
  max_healthy_singleton_ratio: 0.90
  min_student_entropy: 0.015
