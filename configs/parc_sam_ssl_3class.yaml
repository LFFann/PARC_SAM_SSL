experiment:
  name: PARC_SAM_SSL_3Class
  output_dir: outputs/PARC_SAM_SSL_3Class
  seed: 2026
  log_interval: 10
  val_interval: 200
  save_interval: 1000

data:
  root: /root/autodl-tmp/echoData/260703_data_labeled30pct
  dataset_name: null
  num_classes: 3
  in_channels: 3
  image_size: 256
  num_workers: 2

model:
  base_channels: 32
  dropout: 0.1
  feature_dim: 128

sam:
  enabled: true
  allow_surrogate_without_checkpoint: false
  checkpoint: /root/autodl-tmp/sam_vit_b_01ec64.pth
  model_type: vit_b
  source: auto
  image_size: 1024
  min_prompt_area: 16
  min_sam_confidence: 0.50

train:
  device: cuda
  max_iterations: 10000
  batch_size_labeled: 8
  batch_size_unlabeled: 8
  lr: 0.001
  weight_decay: 0.0001
  ema_decay: 0.995
  amp: true
  grad_clip: 5.0

loss:
  supervised: 1.0
  pseudo: 1.0
  proposal_set: 0.35
  prototype: 0.15
  correlation: 0.10
  sam_alignment: 0.15
  min_pseudo_weight: 0.05
  pseudo_on_singletons_only: true

risk:
  alpha: 0.10
  min_pixels_per_class: 64
  min_quantile: 0.02
  max_quantile: 0.95
  max_foreground_quantile: 0.85
  prior_momentum: 0.90
  class_balance_power: 0.50
  teacher_confidence: 0.60
  max_candidate_set_size: 2
  agreement_bonus: 0.20
  conflict_penalty: 0.50
  safe_negative_threshold: 0.03

target:
  target_mode: set_valued
  use_risk: true
  use_sam: true
  use_prototype: true
  use_correlation: true
  use_alignment: true
  foreground_guard: true
  min_foreground_participation: 0.02
  foreground_rescue_confidence: 0.35
  foreground_min_weight: 0.15

prototype:
  momentum: 0.95
  temperature: 0.07
  min_pixels: 32

visualization:
  enabled: true
  interval: 200
  max_images: 2
  panel_size: 192
  min_healthy_foreground_ratio: 0.01
  max_healthy_background_only_ratio: 0.98
  max_healthy_singleton_ratio: 0.995
  min_student_entropy: 0.02
